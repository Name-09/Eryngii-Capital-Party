            background-color: #f4f1ea;

            margin-bottom: 40px;
            padding-left: 1.5em;
            text-indent: -1.5em;
        }

            height: 50px;
            vertical-align: middle;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 80px;

    <header>
        <div class="container">
            <div class="logo">
                <a href="index.html">

            <nav>

    <main>
        <div class="policy-document">
            <h1>エリンギ資本主義党 基本政策</h1>

            <div class="policy-content">
                <div class="policy-item">１．エリンギを縦4～6等分に切る。</div>
                <div class="policy-item">２．フライパンにバターを入れて熱し、エリンギを入れて強火で焼く。</div>
                <div class="policy-item">３．両面に焼き色がついたら中火にし、火が通るまで焼く。</div>
                <div class="policy-item">４．ポン酢を回し入れ、水分を飛ばしながら全体に味を絡める。</div>
                <div class="policy-item">５．器に盛り、お好みで万能ねぎを散らす。</div>
            </div>

            <div style="border-top: 1px solid #3e2723; padding-top: 40px; text-align: right; margin-top: 100px;">
                <p>令和8年4月1日 施行</p>
                <p style="font-weight: bold; font-size: 1.5rem;">エリンギ資本主義党 党首　榎木</p>
            </div>

            <div class="reference">
                出典：セブンプレミアム向上委員会
            </div>
        </div>
